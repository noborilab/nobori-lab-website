# Collaboration Garden data sync
# ─────────────────────────────────────────────────────────────────────────────
# STATUS: DISABLED — do not enable until all lab members have provided consent
#         for their research profiles to appear on the public website.
#
# To enable:
#   1. Obtain written consent from every lab member listed in the sheets.
#   2. Add SCORES_CSV_URL and COLLAB_CSV_URL as repository secrets
#      (Settings → Secrets → Actions).  Values = the "Publish to web → CSV"
#      URLs of the scores and collaborations sheets respectively.
#   3. Uncomment the `schedule` trigger below.
#   4. Remove the `if: false` guard on the sync job.
#   5. Merge the feature/lab-profile branch to main.
# ─────────────────────────────────────────────────────────────────────────────

name: Sync Lab Profile

on:
  # Disabled: uncomment when consent is confirmed and SHEET_CSV_URL secret is set
  # schedule:
  #   - cron: '0 3 * * 1'   # Mondays 03:00 UTC
  workflow_dispatch:         # manual trigger always available for testing

jobs:
  sync:
    name: Fetch profile data and rebuild
    runs-on: ubuntu-latest
    # DISABLED — remove this guard when ready to activate
    if: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build lab profile data
        run: node scripts/build-lab-data.mjs
        env:
          # Set these secrets in: Settings → Secrets and variables → Actions
          SCORES_CSV_URL: ${{ secrets.SCORES_CSV_URL }}
          COLLAB_CSV_URL: ${{ secrets.COLLAB_CSV_URL }}

      - name: Build
        run: npm run build

      - name: Commit updated profile data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/labProfile.json data/source/scores.csv data/source/collaborations.csv
          git diff --cached --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: sync lab profile data [skip ci]"
          git push
